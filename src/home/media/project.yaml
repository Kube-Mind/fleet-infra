apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: home-media
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/tracking-id: home:argoproj.io/Application:argo-cd/home-media
  labels:
    app.kubernetes.io/instance: 'home-media'
    app.kubernetes.io/component: media
    app.kubernetes.io/part-of: home
    app.kubernetes.io/managed-by: argo-cd
spec:
  description: Project for home media applications
  sourceRepos:
    - 'https://github.com/Kube-Mind/fleet-infra.git'
  destinations:
    - namespace: 'argo-cd'
      server: '*'
    - namespace: 'immich'
      server: '*'
    - namespace: 'owncloud'
      server: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'