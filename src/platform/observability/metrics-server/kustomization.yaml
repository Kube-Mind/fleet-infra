apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- namespace.yaml

helmCharts:
- name: metrics-server
  namespace: metrics-server
  releaseName: metrics-server
  repo: https://kubernetes-sigs.github.io/metrics-server/
  valuesFile: values.yaml
  version: 3.13.0
  includeCRDs: true