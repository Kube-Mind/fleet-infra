apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- namespace.yaml

helmCharts:
  - name: cloudnative-pg
    valuesFile: operator/values.yaml
    releaseName: cloudnative-pg
    namespace: postgres
    version: 0.28.2
    includeCRDs: true
    repo: https://cloudnative-pg.github.io/charts