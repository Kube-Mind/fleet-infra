apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- namespace.yaml

helmCharts:
- name: postgres-operator
  namespace: postgres
  releaseName: pg-operator
  repo: https://opensource.zalando.com/postgres-operator/charts/postgres-operator
  valuesFile: operator/values.yaml
  version: 1.15.1
  includeCRDs: true