server:
  ingress:
    enabled: true
    hosts:
      - auth.jcan.dev
    annotations:
      cert-manager.io/cluster-issuer: le-ing-prd
      ingress.cilium.io/loadbalancer-mode: shared
    ingressClassName: cilium
    tls:
      - secretName: authentik-tls
        hosts:
          - auth.jcan.dev

postgresql:
  enabled: true
redis:
  enabled: true

# Reference the secret created above
global:
  envFrom:
    - secretRef:
        name: authentik-external-secret
  env:
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          key: password
          name: authentik-postgresql

blueprints:
  # -- List of config maps to mount blueprints from.
  # Only keys in the configMap ending with `.yaml` will be discovered and applied.
  configMaps:
    - authentik-blueprints