k8sServiceHost: 127.0.0.1
k8sServicePort: 6444
# --- CRITICAL SAFETY SETTINGS ---
# Enable eBPF-based Service load balancing
kubeProxyReplacement: true 

# Enable eBPF Host Routing to bypass the legacy stack
bpf:
  hostRouting: true

# Allow Cilium to manage CNI configuration natively
cni:
  exclusive: false

# Keep this as is; it allows host-to-pod traffic to use the eBPF datapath
hostServices:
  enabled: true

# Explicit node IP detection
nodePort:
  enabled: false

# MTU (9000 jumbo - 50 vxlan overhead)
mtu: 8950

# IPAM
ipam:
  mode: cluster-pool
  operator:
    clusterPoolIPv4PodCIDRList:
      - "10.0.0.0/16"
    clusterPoolIPv4MaskSize: 24

# Disable bandwidth manager for now (less complexity)
bandwidthManager:
  enabled: false

enableMulticast: false
multicast:
  enabled: false

operator:
  rollOutPods: true
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Roll out cilium agent pods automatically when ConfigMap is updated.
rollOutCiliumPods: true
agent: true
agentConfig:
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 512Mi



#debug:
#  enabled: true

# Increase rate limit when doing L2 announcements
k8sClientRateLimit:
  qps: 20
  burst: 100

l2announcements:
  enabled: true

externalIPs:
  enabled: true

#enableCiliumEndpointSlice: true

loadBalancer:
  # https://docs.cilium.io/en/stable/network/kubernetes/kubeproxy-free/#maglev-consistent-hashing
  algorithm: maglev

gatewayAPI:
  enabled: false
envoy:
  securityContext:
    capabilities:
      keepCapNetBindService: true
      envoy: [NET_ADMIN, PERFMON, BPF]
  streamIdleTimeoutDurationSeconds: 0
  idleTimeoutDurationSeconds: 60
  connectTimeoutSeconds: 2
  maxConnectionDurationSeconds: 0

hubble:
  peerService:
    clusterDomain: cluster.local
  enabled: true
  relay:
    enabled: true
    rollOutPods: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  ui:
    enabled: true
    rollOutPods: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

ingressController:
  enabled: false

# Network Policy Audit Mode - Log violations without blocking
policyAuditMode: false

# mTLS
authentication:
  enabled: false
