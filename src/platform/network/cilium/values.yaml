k8sServiceHost: 172.16.1.14
k8sServicePort: 6443

# --- CRITICAL SAFETY SETTINGS ---
kubeProxyReplacement: false
hostFirewall:
  enabled: false

hostServices:
  enabled: true
# --- CNI ---
cni:
  exclusive: true

# Explicit node IP detection
nodePort:
  enabled: false

# Avoid host-routing complexity
bpf:
  hostRouting: false

# MTU (9000 jumbo - 50 vxlan overhead)
mtu: 8950

# IPAM
ipam:
  mode: cluster-pool
  operator:
    clusterPoolIPv4PodCIDRList:
      - "10.0.0.0/16"
    clusterPoolIPv4MaskSize: 24

# Disable bandwidth manager for now (less complexity)
bandwidthManager:
  enabled: false

# Observability optional
hubble:
  enabled: true
  relay:
    enabled: true
    # Add these lines to fix your TLS issues
    tls:
      enabled: true
      # This forces the chart to re-render the secret resources
      # Increment this number if you need to rotate again in the future
      certGen:
        extraAnnotations:
          "helm.sh/hook": pre-install,pre-upgrade
      server:
        enabled: true
      client:
        enabled: true
  ui:
    enabled: true
