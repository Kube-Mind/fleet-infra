enabled: true
fullnameOverride: nvidia-operator

toolkit:
  env:
  - name: CONTAINERD_CONFIG
    value: /var/lib/rancher/k3s/agent/etc/containerd/config.toml
  - name: CONTAINERD_SOCKET
    value: /run/k3s/containerd/containerd.sock
  - name: CONTAINERD_RUNTIME_CLASS
    value: nvidia
  - name: CONTAINERD_SET_AS_DEFAULT
    value: "true"

migManager:
  enabled: false
  config:
    name: default-mig-parted-config

node-feature-discovery:
  worker:
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/etcd
        operator: Exists
        effect: NoExecute

validator:
  plugin:
    env:	
      - name: WITH_WORKLOAD	
        value: 'false'

dcgmExporter:
  enabled: true

  # Needed for kube-prometheus-stack
  serviceMonitor:
    enabled: true
    interval: 15s
    honorLabels: true
    additionalLabels:
      release: kube-prometheus-stack

  # Better for Prometheus scraping per-node
  service:
    internalTrafficPolicy: Local

  # Needed on baremetal / k3s for GPU metrics
  hostPID: true

  # Avoid profiling errors on mixed GPUs / consumer GPUs
  env:
    - name: DCGM_EXPORTER_DISABLE_PROFILING
      value: "true"

    - name: DCGM_EXPORTER_KUBERNETES
      value: "true"

    - name: DCGM_EXPORTER_COLLECTORS
      value: /etc/dcgm-exporter/default-counters.csv