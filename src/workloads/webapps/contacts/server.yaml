---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: contacts
  labels:
    app: contacts-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contacts-server
  template:
    metadata:
      labels:
        app: contacts-server
    spec:
      serviceAccountName: contacts-server-waiter
      initContainers:
        - name: wait-for-postgres
          image: "alpine/kubectl:latest"
          imagePullPolicy: IfNotPresent
          args:
            - wait 
            - -l app=contacts-postgres 
            - --for=condition=ready 
            - pod 
            - --timeout=360s
      containers:
        - name: server          
          image: ocr.jcan.dev/library/talon/contacts-server:1.4.1
          ports:
            - containerPort: 3001
          env: 
          - name: NODE_ENV
            value: production
          - name: PORT
            value: "3001"
          - name: DATABASE_URL
            value: postgresql://contacts:contacts@postgres:5432/contacts
          - name: JSON_BODY_LIMIT
            value: 10mb
      imagePullSecrets:
        - name: aws-iam-keys-contacts
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: contacts-server-waiter
  namespace: contacts
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: contacts-server-waiter
  namespace: contacts
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: contacts-server-waiter
  namespace: contacts
subjects:
  - kind: ServiceAccount
    name: contacts-server-waiter
    namespace: contacts
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: contacts-server-waiter
---
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: contacts
spec:
  selector:
    app: contacts-server
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
