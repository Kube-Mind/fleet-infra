apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: workloads-webapps
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/tracking-id: workloads:argoproj.io/Application:argo-cd/workloads-webapps
  labels:
    app.kubernetes.io/instance: 'workloads-webapps'
    app.kubernetes.io/component: webapps
    app.kubernetes.io/part-of: workloads
    app.kubernetes.io/managed-by: argo-cd
spec:
  description: Project for webapps workloads
  sourceRepos:
    - 'https://github.com/Kube-Mind/fleet-infra.git'
  destinations:
    - namespace: 'argo-cd'
      server: '*'
    - namespace: 'contacts'
      server: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'