apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- namespace.yaml
- external-secret.yaml
- pipelines
- db-postgres.yaml

helmCharts:
- name: open-webui
  namespace: open-webui
  releaseName: open-webui
  repo: https://helm.openwebui.com
  valuesFile: values.yaml
  version: 14.11.0