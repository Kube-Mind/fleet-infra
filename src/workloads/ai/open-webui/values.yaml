nameOverride: ""
namespaceOverride: ""
ollama:
  # -- Automatically install Ollama Helm chart from https://otwld.github.io/ollama-helm/. Use [Helm Values](https://github.com/otwld/ollama-helm/#helm-values) to configure
  enabled: false

pipelines:
  # -- Automatically install Pipelines chart to extend Open WebUI functionality using Pipelines: https://github.com/open-webui/pipelines
  enabled: true
  # -- This section can be used to pass required environment variables to your pipelines (e.g. Langfuse hostname)
  extraEnvVars:
    - name: PIPELINES_LOG_LEVEL
      value: "DEBUG"
    # API key used by OpenWebUI to access PIPELINES API
    - name: PIPELINES_API_KEY
      valueFrom:
        secretKeyRef: 
          name: open-webui-external-secret
          key: PIPELINES_API_KEY
    - name: QDRANT_API_KEY
      valueFrom:
        secretKeyRef:
          name: open-webui-external-secret
          key: QDRANT_SERVICE_API_KEY
    - name: OLLAMA_BASE_URL
      value: "http://ollama.ollama.svc.cluster.local:11434"
    - name: COMFYUI_BASE_URL
      value: "http://sd-comfyui-chart.sd-comfyui.svc.cluster.local"

tika:
  # -- Automatically install Apache Tika to extend Open WebUI
  enabled: true

terminals:
  # -- Automatically install Terminals chart to extend Open WebUI functionality using Terminals:
  enabled: true

# -- A list of Ollama API endpoints. These can be added in lieu of automatically installing the Ollama Helm chart, or in addition to it.
ollamaUrls: []

# -- Disables taking Ollama Urls from `ollamaUrls`  list
ollamaUrlsFromExtraEnv: true

websocket:
  # -- Enables websocket support in Open WebUI with env `ENABLE_WEBSOCKET_SUPPORT`
  # @section -- Websocket configuration
  enabled: true

# -- Value of cluster domain
clusterDomain: cluster.local

annotations: {}
podAnnotations: {}
podLabels: {}
replicaCount: 1
# -- Strategy for updating the workload manager: deployment or statefulset
strategy: {}

# -- Open WebUI container command (overrides default entrypoint)
command: []
# -- Open WebUI container arguments (overrides default)
args: []

serviceAccount:
  enable: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

# -- Configure imagePullSecrets to use private registry
# ref: <https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry>
imagePullSecrets: []
# imagePullSecrets:
# - name: myRegistryKeySecretName

# -- Probe for liveness of the Open WebUI container
# ref: <https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes>
livenessProbe: {}
# livenessProbe:
#   httpGet:
#     path: /health
#     port: http
#   failureThreshold: 1
#   periodSeconds: 10

# -- Probe for readiness of the Open WebUI container
# ref: <https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes>
readinessProbe: {}
# readinessProbe:
#   httpGet:
#     path: /health/db
#     port: http
#   failureThreshold: 1
#   periodSeconds: 10

# -- Probe for startup of the Open WebUI container
# ref: <https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes>
startupProbe: {}
# startupProbe:
#   httpGet:
#     path: /health
#     port: http
#   initialDelaySeconds: 30
#   periodSeconds: 5
#   failureThreshold: 20

resources:
  requests:
    cpu: '500m'
    memory: '1Gi'
  limits:
    cpu: '1000m'
    memory: '2Gi'

copyAppData:
  # -- Open WebUI copy-app-data init container command (overrides default)
  command: []
  # -- Open WebUI copy-app-data init container arguments (overrides default)
  args: []

  resources: {}

ingress:
  enabled: true
  class: "cilium"
  # -- Use appropriate annotations for your Ingress controller, e.g., for NGINX:
  annotations:
    cert-manager.io/cluster-issuer: le-ing-prd
    ingress.cilium.io/loadbalancer-mode: shared
    ingress.cilium.io/websocket: "enabled"
  host: "chat.jcan.dev" # update to your real domain
  additionalHosts: []
  tls: true
  existingSecret: ""

  # -- Additional custom labels to add to the Ingress metadata
  # Useful for tagging, selecting, or applying policies to the Ingress via labels.
  extraLabels: {}
  # extraLabels:
  #   app.kubernetes.io/environment: "staging"

persistence:
  enabled: true
  size: 20Gi
  # -- Use existingClaim if you want to re-use an existing Open WebUI PVC instead of creating a new one
  existingClaim: ""
  # -- Subdirectory of Open WebUI PVC to mount. Useful if root directory is not empty.
  subPath: ""
  # -- If using multiple replicas, you must update accessModes to ReadWriteMany
  accessModes:
    - ReadWriteMany
  storageClass: "longhorn"
  selector: {}
  annotations: {}
  # -- Sets the storage provider, availables values are `local`, `s3`, `gcs` or `azure`
  provider: local

# -- Node labels for pod assignment.
nodeSelector: {}

# -- Tolerations for pod assignment
tolerations: []

# -- Affinity for pod assignment
affinity: {}

# -- Topology Spread Constraints for pod assignment
topologySpreadConstraints: []

# -- HostAliases to be added to hosts-file of each container
hostAliases: []

# -- Service values to expose Open WebUI pods to cluster
service:
  type: ClusterIP
  annotations: {}
  port: 80
  containerPort: 8080
  nodePort: ""
  labels: {}
  loadBalancerClass: ""

# -- Enables the use of OpenAI APIs
enableOpenaiApi: true

# -- OpenAI base API URL to use. Defaults to the Pipelines service endpoint when Pipelines are enabled, and "https://api.openai.com/v1".
# if Pipelines are not enabled and this value is blank
openaiBaseApiUrl: "http://open-webui-pipelines:9099/v1"

# -- OpenAI base API URLs to use. Overwrites the value in openaiBaseApiUrl if set
openaiBaseApiUrls: []
  # - "https://api.openai.com/v1"
  # - "https://api.company.openai.com/v1"

# -- Env vars added to the Open WebUI deployment. Most up-to-date environment variables can be found here: https://docs.openwebui.com/getting-started/env-configuration/
extraEnvVars:
  - name: WEBUI_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: open-webui-external-secret
        key: OPENWEBUI_SECRET_KEY
  - name: CORS_ALLOW_ORIGIN
    value: 'https://chat.jcan.dev'
  # Authentication
  - name: OAUTH_PROVIDER_NAME
    value: 'authentik'
  - name: OAUTH_CLIENT_ID
    valueFrom:
      secretKeyRef: 
        name: open-webui-external-secret
        key: OAUTH_CLIENT_ID
  - name: OAUTH_CLIENT_SECRET
    valueFrom:
      secretKeyRef: 
        name: open-webui-external-secret
        key: OAUTH_CLIENT_SECRET
  - name: OPENID_PROVIDER_URL
    value: 'https://auth.jcan.dev/application/o/openwebui/.well-known/openid-configuration'
  - name: ENABLE_LOGIN_FORM
    value: 'false'
  - name: OPENID_REDIRECT_URI
    value: 'https://chat.jcan.dev/oauth/oidc/callback'
  - name: WEBUI_SESSION_COOKIE_SECURE
    value: 'true'
  - name: WEBUI_AUTH_COOKIE_SECURE
    value: 'true'
  # For OAuth/SSO, you will probably have to use 'lax' (strict can break OAuth callbacks)
  - name: WEBUI_SESSION_COOKIE_SAME_SITE
    value: 'lax'
  - name: WEBUI_AUTH_COOKIE_SAME_SITE
    value: 'lax'
  # Pipelines
  - name: PIPELINES_API_KEY
    valueFrom:
      secretKeyRef: 
        name: open-webui-external-secret
        key: PIPELINES_API_KEY
  - name: PIPELINES_API_BASE_URL
    value: http://open-webui-pipelines:9099
  - name: OLLAMA_BASE_URL
    value: "http://ollama.ollama.svc.cluster.local:11434"
  # Search engine
  - name: ENABLE_WEB_SEARCH
    value: "true"
  - name: WEB_SEARCH_ENGINE
    value: "duckduckgo"
  # Image generation
  - name: ENABLE_IMAGE_GENERATION
    value: "true"
  - name: IMAGE_GENERATION_ENGINE
    value: "comfyui"
  - name: COMFYUI_BASE_URL
    value: "http://sd-comfyui-chart.sd-comfyui.svc.cluster.local"
  # Forwards user and session information as HTTP headers to OpenAI API, Ollama API, MCP servers, and Tool servers
  # https://docs.openwebui.com/reference/env-configuration/#enable_forward_user_info_headers
  - name: ENABLE_FORWARD_USER_INFO_HEADERS
    value: 'true'
  # https://docs.openwebui.com/reference/env-configuration/#chat_response_stream_delta_chunk_size
  - name: CHAT_RESPONSE_STREAM_DELTA_CHUNK_SIZE
    value: '1'
  # Database configuration (if not using the default sqlite database)
  - name: DB_USER
    valueFrom:
      secretKeyRef: 
        name: open-webui-external-secret
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef: 
        name: open-webui-external-secret
        key: password
  - name: DATABASE_URL
    value: "postgresql://$(DB_USER):$(DB_PASSWORD)@open-webui-postgres-rw:5432/openwebui"
  # QDRANT Integration
  - name: VECTOR_DB
    value: 'qdrant'
  - name: QDRANT_URI
    value: 'http://qdrant.qdrant.svc.cluster.local:6333'
  - name: ENABLE_QDRANT_MULTITENANCY_MODE
    value: 'true'
  - name: QDRANT_API_KEY
    valueFrom:
      secretKeyRef:
        name: open-webui-external-secret
        key: QDRANT_SERVICE_API_KEY
  - name: QDRANT_PREFER_GRPC
    value: 'false'

# -- Env vars added to the Open WebUI deployment, common across environments. Most up-to-date environment variables can be found here: https://docs.openwebui.com/getting-started/env-configuration/ (caution: environment variables defined in both `extraEnvVars` and `commonEnvVars` will result in a conflict. Avoid duplicates)
commonEnvVars: []
  # - name: RAG_EMBEDDING_ENGINE
  #   value: "openai"

# -- Env vars added from configmap or secret to the Open WebUI deployment. Most up-to-date environment variables can be found here: https://docs.openwebui.com/getting-started/env-configuration/ (caution: `extraEnvVars` will take precedence over the value from `extraEnvFrom`)
extraEnvFrom: []
  # - configMapRef:
  #     name: my-config
  # - secretRef:
  #     name: open-webui-external-secret

# -- Configure runtime class
# ref: <https://kubernetes.io/docs/concepts/containers/runtime-class/>
runtimeClassName: ""

# -- Configure container volume mounts
# ref: <https://kubernetes.io/docs/tasks/configure-pod-container/configure-volume-storage/>
volumeMounts:
  initContainer: []
  # - name: ""
  #   mountPath: ""
  container: []
  # - name: ""
  #   mountPath: ""

# -- Additional init containers to add to the deployment/statefulset
# ref: <https://kubernetes.io/docs/concepts/workloads/pods/init-containers/>
extraInitContainers: []
# - name: custom-init
#   image: busybox:latest
#   command: ['sh', '-c', 'echo "Custom init container running"']
#   volumeMounts:
#   - name: data
#     mountPath: /data

# -- Configure pod volumes
# ref: <https://kubernetes.io/docs/tasks/configure-pod-container/configure-volume-storage/>
volumes: []
# - name: ""
#   configMap:
#     name: ""
# - name: ""
#   emptyDir: {}

# -- Configure pod security context
# ref: <https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container>
podSecurityContext:
  {}
  # fsGroupChangePolicy: Always
  # sysctls: []
  # supplementalGroups: []
  # fsGroup: 1001

# -- Configure container security context
# ref: <https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-containe>
containerSecurityContext:
  {}
  # runAsUser: 1001
  # runAsGroup: 1001
  # runAsNonRoot: true
  # privileged: false
  # allowPrivilegeEscalation: false
  # readOnlyRootFilesystem: false
  # capabilities:
  #   drop:
  #     - ALL
  # seccompProfile:
  #   type: "RuntimeDefault"

sso:
  # -- **Enable SSO authentication globally** must enable to use SSO authentication
  # @section -- SSO Configuration
  enabled: true
  # -- Enable account creation when logging in with OAuth (distinct from regular signup)
  # @section -- SSO Configuration
  enableSignup: true
  # -- Allow logging into accounts that match email from OAuth provider (considered insecure)
  # @section -- SSO Configuration
  mergeAccountsByEmail: true
  # -- Enable OAuth role management through access token roles claim
  # @section -- SSO Configuration
  enableRoleManagement: false
  # -- Enable OAuth group management through access token groups claim
  # @section -- SSO Configuration
  enableGroupManagement: true

  google:
    # -- Enable Google OAuth
    # @section -- Google OAuth configuration
    enabled: true
    # -- Google OAuth client ID
    # @section -- Google OAuth configuration
    clientId: "192893871369-f4loiuou8qq66busi7vlgtojcn707755.apps.googleusercontent.com"
    # -- Google OAuth client secret (ignored if clientExistingSecret is set)
    # @section -- Google OAuth configuration
    clientSecret: ""
    # -- Google OAuth client secret from existing secret
    # @section -- Google OAuth configuration
    clientExistingSecret: "open-webui-external-secret"
    # -- Google OAuth client secret key from existing secret
    # @section -- Google OAuth configuration
    clientExistingSecretKey: "GOOGLE_CLIENT_SECRET"

  microsoft:
    # -- Enable Microsoft OAuth
    # @section -- Microsoft OAuth configuration
    enabled: false
    # -- Microsoft OAuth client ID
    # @section -- Microsoft OAuth configuration
    clientId: ""
    # -- Microsoft OAuth client secret (ignored if clientExistingSecret is set)
    # @section -- Microsoft OAuth configuration
    clientSecret: ""
    # -- Microsoft OAuth client secret from existing secret
    # @section -- Microsoft OAuth configuration
    clientExistingSecret: ""
    # -- Microsoft OAuth client secret key from existing secret
    # @section -- Microsoft OAuth configuration
    clientExistingSecretKey: ""
    # -- Microsoft tenant ID - use 9188040d-6c67-4c5b-b112-36a304b66dad for personal accounts
    # @section -- Microsoft OAuth configuration
    tenantId: ""

  github:
    # -- Enable GitHub OAuth
    # @section -- GitHub OAuth configuration
    enabled: false
    # -- GitHub OAuth client ID
    # @section -- GitHub OAuth configuration
    clientId: ""
    # -- GitHub OAuth client secret (ignored if clientExistingSecret is set)
    # @section -- GitHub OAuth configuration
    clientSecret: ""
    # -- GitHub OAuth client secret from existing secret
    # @section -- GitHub OAuth configuration
    clientExistingSecret: ""
    # -- GitHub OAuth client secret key from existing secret
    # @section -- GitHub OAuth configuration
    clientExistingSecretKey: ""

  # TODO: replace GitLab with Authentik
  oidc:
    # -- Enable OIDC authentication
    # @section -- OIDC configuration
    # Configure OIDC through extraEnvVars with the following environment variables:
    # - OIDC_CLIENT_ID
    # - OIDC_CLIENT_SECRET
    # - OIDC_PROVIDER_URL
    enabled: false
    # -- OIDC client ID
    # @section -- OIDC configuration
    clientId: "38a67a685cc0e09415c2fc48d53df079f7934151379a0308e9dbe6808e7af89a"
    # -- OIDC client secret (ignored if clientExistingSecret is set)
    # @section -- OIDC configuration
    clientSecret: ""
    # -- OICD client secret from existing secret
    # @section -- OIDC configuration
    clientExistingSecret: "open-webui-external-secret"
    # -- OIDC client secret key from existing secret
    # @section -- OIDC configuration
    clientExistingSecretKey: "OAUTH_CLIENT_SECRET"
    # -- OIDC provider well known URL
    # @section -- OIDC configuration
    providerUrl: "https://gitlab.com/.well-known/openid-configuration"
    # -- Name of the provider to show on the UI
    # @section -- OIDC configuration
    providerName: "GitLab"
    # -- Scopes to request (space-separated).
    # @section -- OIDC configuration
    scopes: "openid email profile"

  roleManagement:
    # -- The claim that contains the roles (can be nested, e.g., user.roles)
    # @section -- Role management configuration
    rolesClaim: "roles"
    # -- Comma-separated list of roles allowed to log in (receive open webui role user)
    # @section -- Role management configuration
    allowedRoles: ""
    # -- Comma-separated list of roles allowed to log in as admin (receive open webui role admin)
    # @section -- Role management configuration
    adminRoles: ""

  groupManagement:
    # -- The claim that contains the groups (can be nested, e.g., user.memberOf)
    # @section -- SSO Configuration
    groupsClaim: "groups"

  trustedHeader:
    # -- Enable trusted header authentication
    # @section -- SSO trusted header authentication
    enabled: false
    # -- Header containing the user's email address
    # @section -- SSO trusted header authentication
    emailHeader: ""
    # -- Header containing the user's name (optional, used for new user creation)
    # @section -- SSO trusted header authentication
    nameHeader: ""

# -- Extra resources to deploy with Open WebUI
extraResources:
  []
  # - apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: example-configmap
  #   data:
  #     example-key: example-value

# -- Configure database URL, needed to work with Postgres (example: `postgresql://<user>:<password>@<service>:<port>/<database>`), leave empty to use the default sqlite database
databaseUrl: ""

# -- Postgresql configuration
postgresql:
  enabled: false

# Configure Application logging levels (see. https://docs.openwebui.com/getting-started/advanced-topics/logging#-logging-levels-explained)
logging:
  # -- Set the global log level ["notset", "debug", "info" (default), "warning", "error", "critical"]
  # @section -- Logging configuration
  level: ""

  # Optional granularity: override log levels per subsystem/component
  # if not set, it will use the global level (see. https://docs.openwebui.com/getting-started/advanced-topics/logging#%EF%B8%8F-appbackend-specific-logging-levels)
  components:
    # -- Set the log level for the Audio processing component
    # @section -- Logging configuration
    audio: ""
    # -- Set the log level for the ComfyUI Integration component
    # @section -- Logging configuration
    comfyui: ""
    # -- Set the log level for the Configuration Management component
    # @section -- Logging configuration
    config: ""
    # -- Set the log level for the Database Operations (Peewee) component
    # @section -- Logging configuration
    db: ""
    # -- Set the log level for the Image Generation component
    # @section -- Logging configuration
    images: ""
    # -- Set the log level for the Main Application Execution component
    # @section -- Logging configuration
    main: ""
    # -- Set the log level for the Model Management component
    # @section -- Logging configuration
    models: ""
    # -- Set the log level for the Ollama Backend Integration component
    # @section -- Logging configuration
    ollama: ""
    # -- Set the log level for the OpenAI API Integration component
    # @section -- Logging configuration
    openai: ""
    # -- Set the log level for the Retrieval-Augmented Generation (RAG) component
    # @section -- Logging configuration
    rag: ""
    # -- Set the log level for the Authentication Webhook component
    # @section -- Logging configuration
    webhook: ""

