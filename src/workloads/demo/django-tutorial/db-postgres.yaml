apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: django-tutorial
spec:
  instances: 1
  
  storage:
    size: 1Gi
    storageClass: longhorn # Change to matching provisioner (e.g., standard, gp3)

  # Instruct CNPG to provision the user using the Secret created by ESO
  managed:
    roles:
      - connectionLimit: -1	
        ensure: present	
        inherit: true
        name: django
        login: true
        passwordSecret:
          name: django-external-secret

  # Bootstrap an initial application database owned by our managed role
  bootstrap:
    initdb:
      database: django
      owner: django